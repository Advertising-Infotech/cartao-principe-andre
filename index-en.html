    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #D4AF37; --gold-dark: #b5952f; --white-10: rgba(255,255,255,0.1); --white-20: rgba(255,255,255,0.2); --white-5: rgba(255,255,255,0.05); }

    .glow { position: absolute; top: -5rem; right: -5rem; width: 16rem; height: 16rem; background: var(--gold); border-radius: 50%; mix-blend-mode: overlay; filter: blur(100px); opacity: 0.2; pointer-events: none; }

    .flag-btn { width: 2rem; height: 1.5rem; overflow: hidden; border-radius: 0.125rem; border: none; cursor: pointer; transition: all 0.3s; opacity: 0.6; filter: grayscale(50%); }
    .flag-btn:hover { transform: scale(1.25); opacity: 1; filter: grayscale(0%); }
    .flag-btn.active { transform: scale(1.25); opacity: 1; filter: grayscale(0%); box-shadow: 0 0 8px 2px rgba(212,175,55,0.8); }
    .flag-btn img { width: 100%; height: 100%; object-fit: cover; }
    .profile { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 0.5rem; }
    .photo-container { position: relative; margin-bottom: 1rem; }
    .photo-glow { position: absolute; inset: 0; border-radius: 1.5rem; background: var(--gold); blur: 20px; opacity: 0.4; transition: opacity 0.5s; }
    .photo-container:hover .photo-glow { opacity: 0.6; }
    .photo { position: relative; width: 10rem; height: 10rem; border-radius: 1.5rem; object-fit: cover; border: 4px solid var(--gold); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); }
    .name { font-size: 2.1rem; font-weight: 700; letter-spacing: -0.025em; text-shadow: 0 4px 6px rgba(0,0,0,0.5); line-height: 1; margin-bottom: 0.75rem; }
    .name-first { font-style: italic; color: var(--gold); animation: blink-gold 1.5s infinite; }
    .name-rest { animation: blink-white 1.5s infinite; }

    @keyframes blink-white { 0%, 50% { color: #ffffff; } 100% { color: #ffffff; } }
    .role { color: var(--gold); font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.25rem; width: 100%; }
    .bio { color: #fff; font-size: 1.05rem; font-weight: 300; width: 100%; line-height: 1.625; letter-spacing: -0.025em; margin-bottom: 1rem; }
    .social { display: flex; gap: 1.5rem; margin-bottom: 0.5rem; }

    .social a:hover { color: var(--gold); transform: scale(1.1); }
    .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; width: 100%; margin-bottom: 0.5rem; }
    .action-btn { display: flex; align-items: center; justify-content: center; padding: 0.75rem; border-radius: 0.75rem; background: var(--white-5); border: 1px solid var(--white-10); color: var(--gold); transition: all 0.3s; }
    .action-btn:hover { background: rgba(212,175,55,0.2); border-color: rgba(212,175,55,0.5); transform: scale(1.05); }
    .action-btn:hover svg { color: #fff; }
    .carousel { width: 100%; margin-top: 0.5rem; margin-bottom: 1rem; }
    .carousel-counter { display: flex; justify-content: flex-end; margin-bottom: 1rem; padding: 0 0.25rem; }
    .counter { font-size: 1.5rem; font-weight: 700; color: var(--gold); animation: blink-gold 1s infinite; }
    .carousel-card { position: relative; overflow: hidden; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); background: var(--white-5); backdrop-filter: blur(12px); transition: transform 0.3s; }
    .carousel-card:hover { transform: scale(1.02); }
    .carousel-image-container { position: relative; height: 16rem; width: 100%; overflow: hidden; background: rgba(0,0,0,0.4); }
    .carousel-image { width: 100%; height: 100%; object-fit: contain; }
    .carousel-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent 50%); }
    .carousel-badge { position: absolute; top: 0.75rem; right: 0.75rem; color: var(--gold); font-size: 0.6875rem; font-weight: 900; line-height: 1.25; text-align: right; text-transform: uppercase; letter-spacing: 0.2em; text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 10; }
    .carousel-title { position: absolute; bottom: 1rem; left: 1rem; right: 1rem; z-index: 20; }
    .carousel-title h4 { font-weight: 700; color: #fff; font-size: 1.125rem; line-height: 1.25; text-shadow: 0 4px 6px rgba(0,0,0,0.5); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .carousel-content { padding: 0.75rem 1rem 1rem; background: var(--white-5); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.05); }
    .carousel-description { color: #d1d5db; margin-bottom: 0.5rem; font-size: 0.82rem; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .carousel-footer { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
    .carousel-tag { color: var(--gold); font-weight: 700; font-size: 1rem; line-height: 1.25; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .carousel-buttons { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .carousel-btn { display: flex; align-items: center; gap: 0.25rem; padding: 0.5rem 0.625rem; border-radius: 0.5rem; background: var(--white-10); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 0.625rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(8px); }
    .carousel-btn:hover { background: var(--gold); color: #000; }
    .cta-btn { width: 100%; background: var(--gold); color: #000; font-weight: 700; padding: 1rem; border-radius: 0.75rem; border: none; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
