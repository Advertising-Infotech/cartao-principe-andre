  <title>安德烈·路易斯王子 - 数字名片</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #D4AF37; --gold-dark: #b5952f; --white-10: rgba(255,255,255,0.1); --white-20: rgba(255,255,255,0.2); --white-5: rgba(255,255,255,0.05); }
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { position: relative; width: 100%; max-width: 448px; min-height: 100vh; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); padding: 1.5rem; display: flex; flex-direction: column; align-items: center; }
    @media (min-width: 640px) { .container { min-height: 85vh; border-radius: 2rem; } }
    .glow { position: absolute; top: -5rem; left: -5rem; width: 16rem; height: 16rem; background: var(--gold); border-radius: 50%; mix-blend-mode: overlay; filter: blur(100px); opacity: 0.2; pointer-events: none; }
    .flags { display: flex; gap: 0.75rem; margin-bottom: 1rem; direction: ltr; }
    .flag-btn { width: 2rem; height: 1.5rem; overflow: hidden; border-radius: 0.125rem; border: none; cursor: pointer; transition: all 0.3s; opacity: 0.6; filter: grayscale(50%); }
    .flag-btn:hover { transform: scale(1.25); opacity: 1; filter: grayscale(0%); }
    .flag-btn.active { transform: scale(1.25); opacity: 1; filter: grayscale(0%); box-shadow: 0 0 8px 2px rgba(212,175,55,0.8); }
    .flag-btn img { width: 100%; height: 100%; object-fit: cover; }
    .profile { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 0.5rem; }
    .photo-container { position: relative; margin-bottom: 1rem; }
    .photo-glow { position: absolute; inset: 0; border-radius: 1.5rem; background: var(--gold); filter: blur(20px); opacity: 0.4; transition: opacity 0.5s; }
    .photo-container:hover .photo-glow { opacity: 0.6; }
    .photo { position: relative; width: 10rem; height: 10rem; border-radius: 1.5rem; object-fit: cover; border: 4px solid var(--gold); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); }
    .name { font-size: 2.1rem; font-weight: 700; letter-spacing: -0.025em; text-shadow: 0 4px 6px rgba(0,0,0,0.5); line-height: 1; margin-bottom: 0.75rem; }
    .name-first { font-style: italic; color: var(--gold); animation: blink-gold 1.5s infinite; }
    .name-rest { animation: blink-white 1.5s infinite; }
    @keyframes blink-gold { 0%, 100% { color: var(--gold); } 50% { color: #ffff00; } }
    @keyframes blink-white { 0%, 50% { color: #ffffff; } 100% { color: #ffffff; } }
    .role { color: var(--gold); font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.25rem; width: 100%; }
    .bio { color: #fff; font-size: 1.05rem; font-weight: 300; width: 100%; line-height: 1.625; letter-spacing: -0.025em; margin-bottom: 1rem; }
    .social { display: flex; gap: 1.5rem; margin-bottom: 0.5rem; }
    .social a { color: #9ca3af; transition: all 0.3s; }
    .social a:hover { color: var(--gold); transform: scale(1.1); }
    .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; width: 100%; margin-bottom: 0.5rem; }
    .action-btn { display: flex; align-items: center; justify-content: center; padding: 0.75rem; border-radius: 0.75rem; background: var(--white-5); border: 1px solid var(--white-10); color: var(--gold); transition: all 0.3s; }
    .action-btn:hover { background: rgba(212,175,55,0.2); border-color: rgba(212,175,55,0.5); transform: scale(1.05); }
    .action-btn:hover svg { color: #fff; }
    .carousel { width: 100%; margin-top: 0.5rem; margin-bottom: 1rem; }
    .carousel-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1rem; padding: 0 0.25rem; }
    .titles-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.4; white-space: pre-line; }
    .carousel-counter { display: flex; justify-content: flex-end; margin-bottom: 0; padding: 0; }
    .counter { font-size: 1.5rem; font-weight: 700; color: var(--gold); animation: blink-gold 1s infinite; }
    .carousel-card { position: relative; overflow: hidden; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); background: var(--white-5); backdrop-filter: blur(12px); transition: transform 0.3s; }
    .carousel-card:hover { transform: scale(1.02); }
    .carousel-image-container { position: relative; height: 16rem; width: 100%; overflow: hidden; background: rgba(0,0,0,0.4); }
    .carousel-media { width: 100%; height: 100%; object-fit: contain; object-position: center; }
    .carousel-video { width: 100%; height: 100%; object-fit: cover; object-position: center 41%; }

    .carousel-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent 50%); }
    .carousel-badge { position: absolute; top: 0.75rem; right: 0.75rem; color: var(--gold); font-size: 0.6875rem; font-weight: 900; line-height: 1.25; text-align: right; text-transform: uppercase; letter-spacing: 0.2em; text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 10; white-space: pre-line; }
    .carousel-title { position: absolute; bottom: 1rem; left: 1rem; right: 1rem; z-index: 20; }
    .carousel-title h4 { font-weight: 700; color: #fff; font-size: 1.125rem; line-height: 1.25; text-shadow: 0 4px 6px rgba(0,0,0,0.5); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .carousel-content { padding: 0.75rem 1rem 1rem; background: var(--white-5); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.05); }
    .carousel-description { font-size: 0.875rem; color: #a1a1aa; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 2; }
    .carousel-footer { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
    .carousel-tag { color: var(--gold); font-weight: 700; font-size: 1rem; line-height: 1.25; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 2; }
    .carousel-buttons { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .carousel-btn { display: flex; align-items: center; gap: 0.25rem; padding: 0.5rem 0.625rem; border-radius: 0.5rem; background: var(--white-10); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 0.625rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(8px); }
    .carousel-btn:hover { background: var(--gold); color: #000; }
    .cta-btn { width: 100%; background: var(--gold); color: #000; font-weight: 700; padding: 1rem; border-radius: 0.75rem; border: none; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
    .cta-btn:hover { background: var(--gold-dark); transform: scale(1.02); box-shadow: 0 0 20px 5px rgba(212,175,55,0.5); }
    .footer { margin-top: auto; padding-top: 2rem; padding-bottom: 1rem; width: 100%; display: flex; flex-direction: column; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
    .footer p { color: #6b7280; font-size: 0.625rem; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }

    /* Contact Modal */
    .contact-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(15px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .contact-modal.active {
      display: flex;
      opacity: 1;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .contact-modal.active .contact-card {
      transform: translateY(0);
    }

    .close-modal {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .close-modal:hover {
      background: var(--gold);
      color: #000;
    }

    .modal-photo {
      width: 8rem;
      height: 8rem;
      border-radius: 2rem;
      border: 3px solid var(--gold);
      margin-bottom: 1.5rem;
      object-fit: cover;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
    }

    .modal-name {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .modal-role {
      color: var(--gold);
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }

    .modal-msg {
      color: #d1d5db;
      font-size: 0.875rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .modal-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem;
      border-radius: 1rem;
      background: var(--gold);
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .modal-btn:hover {
      background: var(--gold-dark);
      transform: scale(1.02);
    }
    .download-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .download-modal-content {
      background: #1a1a2e;
      padding: 2rem;
      border-radius: 12px;
      max-width: 90%;
      text-align: center;
      color: #fff;
      border: 2px solid #d4af37;
    }
    .download-modal-content h3 {
      color: #d4af37;
      margin-bottom: 1rem;
    }
    .download-modal-content p {
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .download-modal-content button {
      background: #d4af37;
      color: #1a1a2e;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 1rem;
    }
